# ===========================================================================
# ProfPlan — development stack (single-command infrastructure)
#
# Profiles:
#   dev           -> core services + dev tooling (adminer)
#   production    -> core services only
#   observability -> prometheus, grafana, loki, otel-collector
#   tools         -> one-off tasks (ruff lint), run via `docker compose run`
#
# Examples:
#   docker compose --profile dev up
#   docker compose --profile dev --profile observability up
#   docker compose run --rm lint
# ===========================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # -------------------------------------------------------------------------
  # PostgreSQL + pgvector — never exposed to the host, backend network only.
  # -------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg17
    profiles: ["dev", "production"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    logging: *default-logging

  # -------------------------------------------------------------------------
  # Redis — cache and Celery broker/result backend.
  # -------------------------------------------------------------------------
  redis:
    image: redis:8-alpine
    profiles: ["dev", "production"]
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
    logging: *default-logging

  # -------------------------------------------------------------------------
  # FastAPI application — only receives requests; heavy work goes to the worker.
  # -------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    image: profplan-backend:latest
    profiles: ["dev", "production"]
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
      - frontend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.localhost`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    logging: *default-logging

  # -------------------------------------------------------------------------
  # Celery worker — same image as the API, different command.
  # -------------------------------------------------------------------------
  worker:
    image: profplan-backend:latest
    profiles: ["dev", "production"]
    restart: unless-stopped
    command:
      ["celery", "-A", "app.infrastructure.celery.worker:celery_app",
       "worker", "--loglevel=info"]
    env_file: .env
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test:
        ["CMD", "celery", "-A", "app.infrastructure.celery.worker:celery_app",
         "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    logging: *default-logging

  # -------------------------------------------------------------------------
  # Flower — Celery monitoring dashboard.
  # -------------------------------------------------------------------------
  flower:
    image: profplan-backend:latest
    profiles: ["dev", "production"]
    restart: unless-stopped
    command:
      ["celery", "-A", "app.infrastructure.celery.worker:celery_app",
       "flower", "--port=5555"]
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend
      - frontend
    ports:
      - "5555:5555"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
    logging: *default-logging

  # -------------------------------------------------------------------------
  # MinIO — S3-compatible object storage for documents. Official image.
  # -------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    profiles: ["dev", "production"]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - backend
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
    logging: *default-logging

  # -------------------------------------------------------------------------
  # Traefik — edge router. Only this and the frontend touch the internet.
  # -------------------------------------------------------------------------
  traefik:
    image: traefik:v3.3
    profiles: ["dev", "production"]
    restart: unless-stopped
    command: --configFile=/etc/traefik/traefik.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./docker/traefik/dynamic.yml:/etc/traefik/dynamic/dynamic.yml:ro
    networks:
      - frontend
    ports:
      - "80:80"
      - "8080:8080"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # -------------------------------------------------------------------------
  # Adminer — lightweight DB UI, development only.
  # -------------------------------------------------------------------------
  adminer:
    image: adminer:latest
    profiles: ["dev"]
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    ports:
      - "8081:8080"
    logging: *default-logging

  # -------------------------------------------------------------------------
  # Ruff — lint / PEP 8, run on demand: `docker compose run --rm lint`
  # -------------------------------------------------------------------------
  lint:
    image: ghcr.io/astral-sh/ruff:0.9.6
    profiles: ["tools"]
    working_dir: /io
    volumes:
      - .:/io
    command: ["check", "."]

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  grafana_data:
