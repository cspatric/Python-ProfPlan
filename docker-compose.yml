services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    env_file: .env
    depends_on:
      - postgres
      - redis
      - minio
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.localhost`)"

  worker:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    command: celery -A app.infrastructure.celery.worker worker -l info
    env_file: .env
    depends_on:
      - redis
      - postgres

  beat:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    command: celery -A app.infrastructure.celery.beat beat -l info
    env_file: .env
    depends_on:
      - redis

  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
      - redis-data:/data
    ports:
      - "6379:6379"

  minio:
    build:
      context: .
      dockerfile: docker/minio/Dockerfile
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  traefik:
    image: traefik:v3.0
    command: --configFile=/etc/traefik/traefik.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml
      - ./docker/traefik/dynamic.yml:/etc/traefik/dynamic/dynamic.yml
    ports:
      - "80:80"
      - "8080:8080"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/loki-config.yml
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
      - loki
    volumes:
      - ./docker/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./docker/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  redis-data:
  minio-data:
  grafana-data:
