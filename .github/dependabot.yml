# pip/github-actions stay DETECTION-only: those ecosystems are already covered
# by the now-blocking CI "security" job (pip-audit) on every push, plus
# GitHub's own Dependabot Alerts (Security tab) — routine PRs there would just
# be noise. `docker` is different: nothing else bumps docker/api/Dockerfile's
# pinned base image, so it gets real PRs.
#
# NB: a `directory: "/"` docker-ecosystem entry for docker-compose.yml's
# pinned images was tried and rejected by Dependabot ("No Dockerfiles nor
# Kubernetes YAML found in /") despite compose support being GA — so those
# image tags (see docker-compose.yml) are bumped manually for now.
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    # Never propose a Python major bump (the project targets 3.13).
    ignore:
      - dependency-name: "python"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  - package-ecosystem: "docker"
    directory: "/docker/api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Never propose a Python base-image major bump (the project targets 3.13).
    ignore:
      - dependency-name: "python"
        update-types: ["version-update:semver-major"]
