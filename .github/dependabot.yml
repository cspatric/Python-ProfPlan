# pip/github-actions stay DETECTION-only: those ecosystems are already covered
# by the now-blocking CI "security" job (pip-audit) on every push, plus
# GitHub's own Dependabot Alerts (Security tab) — routine PRs there would just
# be noise. `docker` is different: nothing else bumps our pinned image tags
# (see docker-compose.yml / docker/api/Dockerfile), so it gets real PRs.
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    # Never propose a Python major bump (the project targets 3.13).
    ignore:
      - dependency-name: "python"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  - package-ecosystem: "docker"
    directory: "/docker/api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Never propose a Python base-image major bump (the project targets 3.13).
    ignore:
      - dependency-name: "python"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
